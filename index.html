<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }
    </style>
    <title>Catalance</title>

    <script>
      (function() {
        var hostname = window.location.hostname;
        var isLocalhost = hostname === "localhost" || hostname === "127.0.0.1";

        if (isLocalhost) {
          return;
        }

        window.dataLayer = window.dataLayer || [];
        window.gtag = function(){ window.dataLayer.push(arguments); };

        var googleScript = document.createElement("script");
        googleScript.async = true;
        googleScript.src = "https://www.googletagmanager.com/gtag/js?id=G-FB12B9NRTT";
        document.head.appendChild(googleScript);

        window.gtag("js", new Date());
        window.gtag("config", "G-FB12B9NRTT");

        (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wgo8kk4h5z");
      })();
    </script>

    <!-- Global SPA Chunk Loading Error Recovery -->
    <script type="text/javascript">
      (function() {
        var handleChunkError = function(error) {
          var errorText = String(error && (error.message || error) || "").toLowerCase();
          if (
            errorText.indexOf("failed to fetch dynamically imported module") !== -1 ||
            errorText.indexOf("failed to load module script") !== -1 ||
            errorText.indexOf("expected a javascript-or-wasm module script") !== -1 ||
            errorText.indexOf("strict mime type checking is enforced") !== -1 ||
            errorText.indexOf("typeerror: failed to fetch") !== -1
          ) {
            console.warn("Dynamic module loading failed. A new version of the website has been deployed. Reloading page to fetch the latest changes...", error);
            
            // Limit reload loops within 10 seconds
            var lastReload = window.sessionStorage.getItem("catalance:last-chunk-reload");
            var now = Date.now();
            if (!lastReload || now - Number(lastReload) > 10000) {
              window.sessionStorage.setItem("catalance:last-chunk-reload", String(now));
              window.location.reload();
            }
          }
        };

        window.addEventListener("error", function(event) {
          handleChunkError(event.error);
        });
        
        window.addEventListener("unhandledrejection", function(event) {
          handleChunkError(event.reason);
        });
      })();
    </script>

    <!-- Theme Initializer to prevent FOUC -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem("catalance-theme") || "light";
          document.documentElement.classList.add(theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
